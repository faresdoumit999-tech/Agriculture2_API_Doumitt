name: DOUMITT CI/CD Pipeline

# متى يشتغل هذا الفحص؟ عند أي عملية رفع (Push) للكود
on:
  push:
    branches: [ "main" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest # تشغيل سيرفر لينكس وهمي

    steps:
    # 1. سحب الكود تبعك من المستودع
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. تنزيل لغة بايثون
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # 3. تنزيل المكتبات الخاصة بمشروعك
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

# 4. تشغيل الفحص اللي كتبناه!
    - name: Run Tests (Pytest)
      env:
        DATABASE_URL: "sqlite:///./test_dummy.db" # رابط قاعدة بيانات وهمية للفحص
        SECRET_KEY: "super-secret-test-key" # مفتاح وهمي
      run: |
        pytest